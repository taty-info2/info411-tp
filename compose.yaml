name: info411
services:
    srv-v3:
        container_name: server_info411
        image: srv-v3
        ports:
            - 3001:3001
        # env_file:
        #     - .env
        environment:
          - DB_HOST=${DB_HOST} # soit nom du container qui tourne mariadb soit le nom du service mariadb
          - DB_NAME=${DB_NAME}
          - DB_USER=${DB_USER}
          - DB_PASSWORD=${DB_PASSWORD}
          - WEB_PORT=${WEB_PORT}
          - TPL_DIR=./${TPL_DIR}
          - SQL_DIR=./${SQL_DIR}
    mariadb:
        container_name: mariadb_info411
        image: docker.io/library/mariadb:latest
        # restart: always -> si crash, restart le container
        # image: mariadb sans slash -> soit image locale soit image officielle. Sinon login_docker_hub/nom_image
        environment:
            - MARIADB_ALLOW_EMPTY_ROOT_PASSWORD=yes
            - MARIADB_DATABASE=${DB_NAME}
            - MARIADB_USER=${DB_USER}
            - MARIADB_PASSWORD=${DB_PW}
        volumes:
            - ./bd_data:/var/lib/mysql/
            # - ./sql:/docker-entrypoint_initdb.d -> charge les migrations à la création de la db. /!\ au début de chaque fichier migr ajouter use mabase
